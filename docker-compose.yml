x-clickhouse-defaults: &clickhouse-defaults
  restart: unless-stopped
  image: clickhouse/clickhouse-server:latest
  logging:
    driver: "json-file"
    options:
        max-size: "20m"
        max-file: "5"
  networks:
    - datalake-net
  depends_on:
    - clickhouse-keeper
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144

services:
  # ── CH node 1: active (shard=1, replica=r1) ──────────────────────────────
  clickhouse-blue-1:
    <<: *clickhouse-defaults
    container_name: clickhouse-blue-1
    hostname: clickhouse-blue-1
    ports:
      - 9900:9000
      - 8123:8123
      - 9181:9181   # ClickHouse Keeper (Raft quorum member id=1)
    
    volumes:
      - type: volume
        source: ch-blue-1-data
        target: /var/lib/clickhouse
      - "./topo/clickhouse-blue-1/config.d:/etc/clickhouse-server/config.d/"
      - "./topo/clickhouse-blue-1/users.d:/etc/clickhouse-server/users.d/"
      - "./dict:/data/dwh/dict"
      # - "./force_restore_data:/var/lib/clickhouse/flags/force_restore_data"

  # ── CH node 2: replica (shard=1, replica=r2) ─────────────────────────────
  clickhouse-blue-2:
    <<: *clickhouse-defaults
    container_name: clickhouse-blue-2
    hostname: clickhouse-blue-2
    ports:
      - 9901:9000
      - 8124:8123
      - 9182:9181   # ClickHouse Keeper (Raft quorum member id=2)
    volumes:
      - type: volume
        source: ch-blue-2-data
        target: /var/lib/clickhouse
      - "./topo/clickhouse-blue-2/config.d:/etc/clickhouse-server/config.d/"
      - "./topo/clickhouse-blue-2/users.d:/etc/clickhouse-server/users.d/"
      - "./dict:/data/dwh/dict"
      # - "./force_restore_data:/var/lib/clickhouse/flags/force_restore_data"

  # ── Standalone ClickHouse Keeper (Raft quorum member id=3) ───────────────
  # Required: Raft needs an odd-number quorum (≥3). This lightweight container
  # provides the 3rd vote so the cluster can survive 1-node keeper failure.
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:latest
    container_name: clickhouse-keeper
    hostname: clickhouse-keeper
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
          max-size: "10m"
          max-file: "3"
    networks:
      - datalake-net
    ports:
      - 9183:9181   # Keeper client port (diagnostic use)
    volumes:
      - type: volume
        source: ch-keeper-data
        target: /var/lib/clickhouse-keeper
      - "./topo/clickhouse-keeper:/etc/clickhouse-keeper"

networks:
  datalake-net:
    # driver: bridge
    external: true

volumes:
  ch-blue-1-data:
  ch-blue-2-data:
  ch-keeper-data: